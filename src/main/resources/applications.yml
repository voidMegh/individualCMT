quarkus:
  application:
    name: market-data-service
    version: 1.0.0

  http:
    port: 8080
    host: 0.0.0.0

  websocket:
    max-sessions: 5000
    idle-timeout: 300000

  log:
    level: INFO
    console:
      format: "%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n"
    category:
      "com.marketdata":
        level: DEBUG

market-data:
  simulation:
    enabled: true
    poll-interval-ms: 1000
    delta-threshold: 0.00001

  batching:
    interval-ms: 50
    max-batch-size: 100

  websocket:
    endpoint: /ws/market-data
    max-clients: 5000